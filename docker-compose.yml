version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: buddy_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: buddy_script
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buddy_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://postgres:password123@postgres:5432/buddy_script?schema=public"
      JWT_SECRET: "super-secret-key"
      PORT: 3001
      CORS_ORIGIN: "http://localhost:3000"
    depends_on:
      - postgres

volumes:
  postgres_data:
